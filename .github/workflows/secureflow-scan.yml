name: SecureFlow CI Scan

on:
  push:
  pull_request:

jobs:
  secureflow-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and start backend server
        run: |
          cd server
          npm install
          nohup npm start > server.log 2>&1 &
          npx wait-on http-get://localhost:5000 || sleep 10
        env:
          PORT: 5000
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/secureflow_test' }}

      - name: Run SecureFlow vulnerability scanner
        uses: ./.github/actions/secureflow-scan
        with:
          api-key: ${{ secrets.SECUREFLOW_API_KEY || 'test-key' }}
